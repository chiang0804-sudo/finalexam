牡羊座 Aries
（3/21～4/19）

</h1>

<div class="story">

火象星座｜希臘神話起源<br><br>

從前，希臘國王阿塔瑪斯與雲朵女神涅斐勒生下兩個孩子，分別是王子佛里克索斯和公主赫勒。後來新王后伊諾為了讓自己的孩子繼承王位，設計陷害佛里克索斯，假傳神諭要將他獻祭給宙斯。
涅斐勒向宙斯求救後，宙斯派來擁有金色羊毛的神羊，幫助兄妹倆逃離希臘，但途中赫勒不慎掉入大海，只有佛里克索斯平安抵達科基斯。
為了感謝宙斯，佛里克索斯獻上神羊。後來宙斯便將這隻神羊升上天空，成為今天的牡羊座。



</div>
