摩羯座 Capricorn 
（12/23—1/22）


</h1>

<div class="story">

土象星座｜希臘神話起源<br><br>

牧神潘恩是森林與牧羊之神，擁有羊角、羊蹄與半人半羊的外貌，同時也是擅長音樂的神祇。有一次，奧林帕斯眾神正在舉辦宴會時，可怕的巨人堤豐突然出現。堤豐是大地女神蓋亞之子，擁有極為強大的力量，讓眾神紛紛驚慌逃跑。
潘恩在逃跑途中，急忙跳進河裡，並施法將自己變成魚逃生。但因為動作太匆忙，只有下半身成功變成魚，上半身仍維持羊的模樣，因此成了半羊半魚的奇特樣貌。
後來，潘恩在眾神對抗堤豐的戰爭中，也運用自己的智慧協助宙斯取回力量，幫助眾神擊敗堤豐。為了紀念潘恩的機智與功勞，宙斯便將他的形象升上天空，成為今天的摩羯座。



</div>
