獅子座
Leo（7/23～8/22）

</h1>

<div class="story">

火象星座｜希臘神話起源<br><br>

英雄海克力士是宙斯的兒子，因為天后赫拉的嫉妒，多次遭到陷害。長大後，海克力士因被赫拉施法而失去理智，親手害死自己的妻兒。為了贖罪，他必須完成十二項危險的任務。
第一個任務，就是消滅尼米亞森林中的食人獅並剝下牠的皮。這隻獅子刀箭不入，非常兇猛。海克力士用弓箭攻擊無效後，只好赤手空拳與牠搏鬥，最後成功掐死食人獅。
為了紀念兒子的無畏勇氣，同時也為了表彰這隻巨獅直到最後一刻都不屈服的傲骨，宙斯將這隻猛獅送上了星空，成為了今日的「獅子座」。



</div>
