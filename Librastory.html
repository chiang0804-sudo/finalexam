天秤座 Libra 
（9/23~10/22）

</h1>

<div class="story">

風象星座｜希臘神話起源<br><br>

正義女神阿斯特莉亞在為人類所做善惡裁判時所用的天平，一隻手持天平，一隻手握斬除邪惡的劍，為求公正，所以眼睛皆矇著。
從前的眾神和人類是和平共處於大地上，人的壽命有限，所以寂寞的神不斷創造人類，然而那時的人好爭鬥、惡業橫行，眾神在對人類失望之餘回到天上，只有阿斯特莉亞女神捨不得回去而留在世界上，教人為善。
儘管如此，人類仍繼續墮落，於是戰爭掀起，開始了打打殺殺，最後連阿斯特莉亞也放棄人類而回到天上。
當她飛回天界後，宙斯將她隨身攜帶的那座黃金天秤往天上一拋，成為了今天的「天秤座」，作為警示凡人要保持公正、平衡的象徵。



</div>
