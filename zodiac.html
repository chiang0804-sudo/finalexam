<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
黃道十二宮 AR展示學習
</title>

<style>

*{
  box-sizing:border-box;
}

html,
body{

  margin:0;
  padding:0;

  width:100%;
  min-height:100%;

  overflow-x:hidden;

  font-family:
  "Microsoft JhengHei",
  sans-serif;
}

/* =========================
   背景影片
========================= */

#bg-video{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:-2;
}

/* =========================
   頁面
========================= */

body{

  padding:25px;
}

/* =========================
   星球
========================= */

.planet{

  position:fixed;

  z-index:-1;

  pointer-events:none;

  animation:
  float 6s ease-in-out infinite;
}

/* 地球 */

.earth{

  width:180px;

  top:60px;
  left:30px;
}

/* 月亮 */

.moon{

  width:120px;

  top:260px;
  right:50px;
}

/* 土星 */

.saturn{

  width:260px;

  bottom:20px;
  left:30px;
}

/* 木星 */

.jupiter{

  width:180px;

  top:70px;
  right:200px;
}

/* 海王星 */

.neptune{

  width:150px;

  bottom:120px;
  right:40px;
}

/* 漂浮 */

@keyframes float{

  0%{
    transform:
    translateY(0px);
  }

  50%{
    transform:
    translateY(-15px);
  }

  100%{
    transform:
    translateY(0px);
  }
}

/* =========================
   標題
========================= */

.main-title{

  text-align:center;

  color:white;

  font-size:52px;

  font-weight:bold;

  line-height:1.5;

  margin:20px 0 40px;

  letter-spacing:4px;

  text-shadow:
    0 0 10px #fff,
    0 0 20px #8b5cf6,
    0 0 40px #60a5fa;
}

.main-title span{

  display:block;
}

/* =========================
   星座排列
========================= */

.zodiac-grid{

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:20px;

  max-width:1200px;

  margin:auto;
}

/* =========================
   圖片按鈕
========================= */

.zodiac-btn{

  border:none;

  background:none;

  padding:0;

  cursor:pointer;
}

/* =========================
   星座圖片
========================= */

.zodiac-btn img{

  width:100%;

  display:block;

  border-radius:20px;

  transition:0.3s;
}

.zodiac-btn img:hover{

  transform:scale(1.05);
}

/* =========================
   資料來源
========================= */

.source{

  text-align:center;

  color:white;

  font-size:15px;

  margin-top:40px;

  line-height:1.8;

  text-shadow:
  0 0 10px black;
}

.source a{

  color:#93c5fd;
}

/* =========================
   手機版
========================= */

@media(max-width:768px){

  body{
    padding:15px;
  }

  .main-title{

    font-size:34px;
  }

  .zodiac-grid{

    grid-template-columns:
    repeat(2,1fr);

    gap:15px;
  }

  .earth{
    width:110px;
  }

  .moon{
    width:80px;
  }

  .saturn{
    width:160px;
  }

  .jupiter{
    width:120px;
  }

  .neptune{
    width:100px;
  }
}

</style>

</head>

<body>

<!-- =========================
     背景影片
========================= -->

<video
id="bg-video"
autoplay
muted
