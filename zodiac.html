<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
黃道十二宮 AR展示學習
</title>

<style>

*{
  box-sizing:border-box;
}

html,
body{

  margin:0;
  padding:0;

  width:100%;
  min-height:100%;

  overflow-x:hidden;

  font-family:
  "Microsoft JhengHei",
  sans-serif;
}

/* ===== 背景圖片 ===== */

body{

  background-image:
  url("space.jpg");

  background-size:
  cover;

  background-position:
  center;

  background-repeat:
  no-repeat;

  background-attachment:
  fixed;

  padding:25px;
}

/* ===== 星球背景 ===== */

.planet{

  position:fixed;

  z-index:-1;

  opacity:0.9;

  animation:
  float 6s ease-in-out infinite;
}

/* 地球 */

.earth{

  width:180px;

  top:70px;

  left:30px;
}

/* 月亮 */

.moon{

  width:120px;

  top:280px;

  right:50px;
}

/* 土星 */

.saturn{

  width:240px;

  bottom:40px;

  left:40px;
}

/* 木星 */

.jupiter{

  width:190px;

  top:90px;

  right:180px;
}

/* 海王星 */

.neptune{

  width:160px;

  bottom:100px;

  right:40px;
}

/* ===== 漂浮動畫 ===== */

@keyframes float{

  0%{
    transform:
    translateY(0px);
  }

  50%{
    transform:
    translateY(-15px);
  }

  100%{
    transform:
    translateY(0px);
  }
}

/* ===== 標題 ===== */

.main-title{

  text-align:center;

  color:white;

  font-size:52px;

  font-weight:bold;

  line-height:1.4;

  margin:20px 0 40px;

  letter-spacing:4px;

  text-shadow:
    0 0 10px #fff,
    0 0 20px #8b5cf6,
    0 0 40px #60a5fa;
}

/* 強制換行 */

.main-title span{

  display:block;
}

/* ===== 星座排列 ===== */

.zodiac-grid{

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:20px;

  max-width:1200px;

  margin:auto;
}

/* ===== 圖片按鈕 ===== */

.zodiac-btn{

  border:none;

  background:none;

  padding:0;

  cursor:pointer;
}

/* ===== 星座圖片 ===== */

.zodiac-btn img{

  width:100%;

  display:block;

  border-radius:20px;

  transition:0.3s;
}

/* ===== hover動畫 ===== */

.zodiac-btn img:hover{

  transform:scale(1.05);
}

/* ===== 資料來源 ===== */

.source{

  text-align:center;

  color:white;

  font-size:15px;

  margin-top:40px;

  line-height:1.8;

  text-shadow:
  0 0 10px black;
}

.source a{

  color:#93c5fd;

  text-decoration:none;
}

.source a:hover{

  text-decoration:underline;
}

/* ===== 手機版 ===== */

@media(max-width:768px){

  body{
    padding:16px;
  }

  .main-title{

    font-size:34px;

    margin-bottom:28px;
  }

  .zodiac-grid{

    grid-template-columns:
    repeat(2,1fr);

    gap:16px;
  }

  /* 手機星球 */

  .earth{
    width:110px;
  }

  .moon{
    width:80px;
  }

  .saturn{
    width:150px;
  }

  .jupiter{
    width:120px;
  }

  .neptune{
    width:100px;
  }
}

</style>

</head>
