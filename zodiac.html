<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>黃道十二宮
  AR展示學習</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  font-family:"Microsoft JhengHei",sans-serif;
}

/* 背景動畫 */
#bg-video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* 頁面 */
body{
  padding:24px;
}

/* 大標題 */
.main-title{
  text-align:center;
  color:white;
  font-size:48px;
  font-weight:bold;
  margin:20px 0 40px;
  text-shadow:
    0 0 10px #fff,
    0 0 25px #8b5cf6,
    0 0 45px #60a5fa;
  letter-spacing:4px;
}

/* 星座圖片排列 */
.zodiac-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:24px;
  max-width:1100px;
  margin:0 auto;
}

/* 圖片按鈕 */
.zodiac-btn{
  border:none;
  background:rgba(255,255,255,0.18);
  border-radius:24px;
  padding:12px;
  backdrop-filter:blur(8px);
  box-shadow:0 0 20px rgba(255,255,255,0.18);
  cursor:pointer;
  transition:0.3s;
}

.zodiac-btn:hover{
  transform:scale(1.05);
}

/* 星座圖片 */
.zodiac-btn img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:18px;
  display:block;
}

/* 手機版 */
@media(max-width:768px){
  body{
    padding:16px;
  }

  .main-title{
    font-size:32px;
    margin-bottom:28px;
  }

  .zodiac-grid{
    grid-template-columns:repeat(2,1fr);
    gap:16px;
  }
}
</style>
</head>

<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="background.mp4" type="video/mp4">
</video>

<h1 class="main-title">黃道十二宮 AR展示學習</h1>

<div class="zodiac-grid">

  <button class="zodiac-btn" onclick="location.href='Aries.html'">
    <img src="Aries.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='Taurus.html'">
    <img src="Taurus.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='Gemini.html'">
    <img src="Gemini.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='Cancer.html'">
    <img src="Cancer.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='Leo.html'">
    <img src="Leo.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='Virgo.html'">
    <img src="Virgo.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='Libra.html'">
    <img src="Libra.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='Scorpio.html'">
    <img src="Scorpio.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='Sagittarius.html'">
    <img src="Sagittarius.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='Capricorn.html'">
    <img src="Capricorn.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='test10.html'">
    <img src="Aquarius.png">
  </button>

  <button class="zodiac-btn" onclick="location.href='Pisces.html'">
    <img src="Pisces.png">
  </button>

</div>

</body>
</html>
