<style>

/* ===== 動畫影片背景 ===== */

#bg-video{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:-1;
}

/* ===== body ===== */

body{

  margin:0;

  padding:20px;

  font-family:
  "Microsoft JhengHei",
  sans-serif;
}

/* ===== 主標題 ===== */

h1{

  text-align:center;

  color:white;

  font-size:40px;

  text-shadow:
  0 0 15px black;

  margin-bottom:25px;
}

/* ===== 四象標題 ===== */

.element-title{

  margin-top:35px;

  margin-bottom:15px;

  font-size:28px;

  font-weight:bold;

  text-shadow:
  0 0 10px white;
}

/* ===== 四象顏色 ===== */

.air{
  color:#7dd3fc;
}

.earth{
  color:#c08457;
}

.fire{
  color:#ff7849;
}

.water{
  color:#60a5fa;
}

/* ===== 星座排列 ===== */

.zodiac-grid{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:15px;
}

/* ===== 星座按鈕 ===== */

.zodiac-btn{

  border:none;

  background:
  rgba(255,255,255,0.88);

  border-radius:22px;

  padding:12px;

  backdrop-filter:blur(6px);

  box-shadow:
  0 0 20px
  rgba(255,255,255,0.15);
}

/* ===== 星座圖片 ===== */

.zodiac-btn img{

  width:100%;

  border-radius:16px;
}

/* ===== 中文 ===== */

.zodiac-btn h3{

  margin:10px 0 0;

  color:#5b35c8;

  font-size:20px;
}

/* ===== 英文 ===== */

.zodiac-btn p{

  margin:5px 0 0;

  color:#666;

  font-size:16px;
}

/* ===== 故事頁 ===== */

#story-page{

  display:none;
}

/* ===== 卡片 ===== */

.card{

  background:
  rgba(255,255,255,0.92);

  border:4px solid #8b5cf6;

  border-radius:24px;

  padding:24px;

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 18px
  rgba(139,92,246,0.35);
}

/* ===== 故事圖片 ===== */

.card img{

  width:100%;

  border-radius:18px;

  margin-bottom:18px;
}

/* ===== 標題 ===== */

.card h2{

  text-align:center;

  color:#5b35c8;
}

/* ===== 類型 ===== */

.card h3{

  color:#7c3aed;
}

/* ===== 內文 ===== */

.card p{

  font-size:20px;

  line-height:1.9;

  color:#222;
}

/* ===== 按鈕區 ===== */

.buttons{

  display:flex;

  flex-direction:column;

  gap:12px;

  margin-top:20px;
}

/* ===== 按鈕 ===== */

.action-btn{

  width:100%;

  padding:16px;

  border:none;

  border-radius:50px;

  font-size:20px;

  font-weight:bold;
}

/* ===== 按鈕顏色 ===== */

.read-btn{

  background:#79a9ff;

  color:white;
}

.back-btn{

  background:#8b5cf6;

  color:white;
}

.ar-btn{

  background:#222;

  color:white;
}

</style>

/* ===== 目前音檔 ===== */

let currentAudio = "";

/* ===== 顯示故事 ===== */

function showStory(id){

const zodiac =
zodiacData[id];

currentAudio =
zodiac.audio;

document.getElementById(
"home-page"
).style.display = "none";

document.getElementById(
"story-page"
).style.display = "block";

document.getElementById(
"story-img"
).src =
zodiac.img;

document.getElementById(
"story-title"
).innerText =
zodiac.title;

document.getElementById(
"story-type"
).innerText =
zodiac.type;

document.getElementById(
"story-text"
).innerText =
zodiac.text;

window.scrollTo(0,0);

}

/* ===== 播放錄音 ===== */

function playAudio(){

const audio =
document.getElementById(
"audio-player"
);

audio.pause();

audio.currentTime = 0;

if(currentAudio){

audio.src =
currentAudio;

audio.play();

}

}

/* ===== 返回首頁 ===== */

function backToHome(){

const audio =
document.getElementById(
"audio-player"
);

audio.pause();

audio.currentTime = 0;

document.getElementById(
"story-page"
).style.display = "none";

document.getElementById(
"home-page"
).style.display = "block";

}

/* ===== 返回AR ===== */

function backToAR(){

window.location.href =
"index.html";

}
