<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
黃道十二宮 AR展示學習
</title>

<style>

*{
  box-sizing:border-box;
}

html,
body{

  margin:0;
  padding:0;

  width:100%;
  min-height:100%;

  font-family:
  "Microsoft JhengHei",
  sans-serif;

  overflow-x:hidden;
}

/* ===== 背景影片 ===== */

#bg-video{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:-1;
}

/* ===== 頁面 ===== */

body{

  padding:24px;
}

/* ===== 大標題 ===== */

.main-title{

  text-align:center;

  color:white;

  font-size:52px;

  font-weight:bold;

  line-height:1.4;

  margin:25px 0 45px;

  text-shadow:
    0 0 10px #fff,
    0 0 25px #8b5cf6,
    0 0 45px #60a5fa;

  letter-spacing:4px;
}

/* ===== 星座排列 ===== */

.zodiac-grid{

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:24px;

  max-width:1200px;

  margin:auto;
}

/* ===== 星座按鈕 ===== */

.zodiac-btn{

  border:none;

  background:
  rgba(255,255,255,0.15);

  border-radius:24px;

  padding:12px;

  backdrop-filter:blur(8px);

  box-shadow:
  0 0 20px
  rgba(255,255,255,0.18);

  cursor:pointer;

  transition:0.3s;
}

/* ===== 滑鼠效果 ===== */

.zodiac-btn:hover{

  transform:scale(1.05);

  box-shadow:
  0 0 30px
  rgba(255,255,255,0.35);
}

/* ===== 星座圖片 ===== */

.zodiac-btn img{

  width:100%;

  aspect-ratio:1/1;

  object-fit:cover;

  border-radius:18px;

  display:block;
}

/* ===== 手機版 ===== */

@media(max-width:768px){

  body{
    padding:16px;
  }

  .main-title{

    font-size:34px;

    margin-bottom:30px;
  }

  .zodiac-grid{

    grid-template-columns:
    repeat(2,1fr);

    gap:16px;
  }
}

</style>

</head>

<body>

<!-- ===== 背景影片 ===== -->

<video
id="bg-video"
autoplay
muted
loop
playsinline>

<source
src="background.mp4"
type="video/mp4">

</video>

<!-- ===== 標題 ===== -->

<h1 class="main-title">

黃道十二宮
<br>
AR展示學習

</h1>

<!-- ===== 星座按鈕 ===== -->

</body>

</html>
