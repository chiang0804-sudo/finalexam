<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黃道十二宮 AR展示學習</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  padding:24px;
  font-family:"Microsoft JhengHei",sans-serif;
  background:#f4f0ff;
}

h1{
  text-align:center;
  color:#5b35c8;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  max-width:1100px;
  margin:0 auto;
}

.card{
  background:white;
  border-radius:22px;
  padding:15px;
  text-align:center;
  box-shadow:0 0 15px rgba(139,92,246,0.25);
}

.card img{
  width:100%;
  max-height:180px;
  object-fit:cover;
  border-radius:16px;
  cursor:pointer;
}

.card h2{
  color:#5b35c8;
  margin:10px 0 4px;
}

.card p{
  margin:5px 0;
  color:#333;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:50px;
  background:#8b5cf6;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

@media(max-width:700px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  body{
    padding:16px;
  }

  .card h2{
    font-size:18px;
  }

  .card p{
    font-size:14px;
  }
}
</style>
</head>

<body>

<h1>黃道十二宮 AR展示學習</h1>

<div class="grid" id="zodiac-list"></div>

<script>
const zodiacData = [
  {
    id:"aries",
    name:"牡羊座",
    english:"Aries",
    date:"3/21～4/19",
    personality:"勇敢、直接、行動力強",
    element:"火象星座",
    img:"Aries.png",
    camera:"Aries.html"
  },
  {
    id:"taurus",
    name:"金牛座",
    english:"Taurus",
    date:"4/21～5/20",
    personality:"穩重、務實、重視安全感",
    element:"土象星座",
    img:"Taurus.png",
    camera:"Taurus.html"
  },
  {
    id:"gemini",
    name:"雙子座",
    english:"Gemini",
    date:"5/21～6/21",
    personality:"聰明、靈活、喜歡交流",
    element:"風象星座",
    img:"Gemini.png",
    camera:"Gemini.html"
  },
  {
    id:"cancer",
    name:"巨蟹座",
    english:"Cancer",
    date:"6/22～7/22",
    personality:"溫柔、顧家、重感情",
    element:"水象星座",
    img:"Cancer.png",
    camera:"Cancer.html"
  },
  {
    id:"leo",
    name:"獅子座",
    english:"Leo",
    date:"7/23～8/22",
    personality:"自信、熱情、有領導力",
    element:"火象星座",
    img:"Leo.png",
    camera:"Leo.html"
  },
  {
    id:"virgo",
    name:"處女座",
    english:"Virgo",
    date:"8/23～9/22",
    personality:"細心、理性、追求完美",
    element:"土象星座",
    img:"Virgo.png",
    camera:"Virgo.html"
  },
  {
    id:"libra",
    name:"天秤座",
    english:"Libra",
    date:"9/23～10/22",
    personality:"公平、優雅、重視平衡",
    element:"風象星座",
    img:"Libra.png",
    camera:"Libra.html"
  },
  {
    id:"scorpio",
    name:"天蠍座",
    english:"Scorpio",
    date:"10/24～11/22",
    personality:"神祕、專注、意志堅定",
    element:"水象星座",
    img:"Scorpio.png",
    camera:"Scorpio.html"
  },
  {
    id:"sagittarius",
    name:"射手座",
    english:"Sagittarius",
    date:"11/23～12/21",
    personality:"自由、樂觀、愛冒險",
    element:"火象星座",
    img:"Sagittarius.png",
    camera:"Sagittarius.html"
  },
  {
    id:"capricorn",
    name:"摩羯座",
    english:"Capricorn",
    date:"12/23～1/22",
    personality:"踏實、努力、有責任感",
    element:"土象星座",
    img:"Capricorn.png",
    camera:"Capricorn.html"
  },
  {
    id:"aquarius",
    name:"水瓶座",
    english:"Aquarius",
    date:"1/20～2/18",
    personality:"獨立、創新、思想自由",
    element:"風象星座",
    img:"Aquarius.png",
    camera:"Aquarius.html"
  },
  {
    id:"pisces",
    name:"雙魚座",
    english:"Pisces",
    date:"2/19～3/20",
    personality:"浪漫、敏感、富有想像力",
    element:"水象星座",
    img:"Pisces.png",
    camera:"Pisces.html"
  }
];

const list = document.getElementById("zodiac-list");

zodiacData.forEach(zodiac=>{
  list.innerHTML += `
    <div class="card">
      <img src="${zodiac.img}" onclick="goAR('${zodiac.camera}')">
      <h2>${zodiac.name}</h2>
      <p>${zodiac.english}</p>
      <p>日期：${zodiac.date}</p>
      <p>個性：${zodiac.personality}</p>
      <p>象系：${zodiac.element}</p>
      <button onclick="goStory('${zodiac.id}')">閱讀故事</button>
    </div>
  `;
});

function goAR(cameraFile){
  window.location.href = cameraFile;
}

function goStory(id){
  window.location.href = "story.html?id=" + id;
}
</script>

</body>
</html>
