<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>十二星座故事</title>

<style>

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  font-family:
  "Microsoft JhengHei",
  sans-serif;
}

/* ===== 背景影片 ===== */

#bg-video{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:-1;
}

/* ===== body ===== */

body{

  padding:16px;
}

/* ===== 主標題 ===== */

h1{

  text-align:center;

  color:white;

  font-size:32px;

  text-shadow:
  0 0 15px black;

  margin:10px 0 24px;
}

/* ===== 四象標題 ===== */

.element-title{

  margin-top:28px;

  margin-bottom:12px;

  font-size:24px;

  font-weight:bold;

  text-shadow:
  0 0 10px black;
}

/* ===== 四象顏色 ===== */

.air{
  color:#7dd3fc;
}

.earth{
  color:#c08457;
}

.fire{
  color:#ff7849;
}

.water{
  color:#60a5fa;
}

/* ===== 星座排列 ===== */

.zodiac-grid{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:14px;
}

/* ===== 星座按鈕 ===== */

.zodiac-btn{

  border:none;

  background:
  rgba(255,255,255,0.88);

  border-radius:22px;

  padding:10px;

  backdrop-filter:blur(6px);

  box-shadow:
  0 0 18px
  rgba(255,255,255,0.2);
}

/* ===== 星座圖片 ===== */

.zodiac-btn img{

  width:100%;

  aspect-ratio:1/1;

  object-fit:cover;

  border-radius:16px;
}

/* ===== 中文 ===== */

.zodiac-btn h3{

  margin:10px 0 0;

  color:#5b35c8;

  font-size:19px;
}

/* ===== 英文 ===== */

.zodiac-btn p{

  margin:4px 0 0;

  color:#555;

  font-size:15px;
}

/* ===== 故事頁 ===== */

#story-page{

  display:none;
}

/* ===== 卡片 ===== */

.card{

  background:
  rgba(255,255,255,0.94);

  border:4px solid #8b5cf6;

  border-radius:24px;

  padding:20px;

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 20px
  rgba(139,92,246,0.4);
}

/* ===== 故事圖片 ===== */

.card img{

  width:100%;

  max-height:280px;

  object-fit:cover;

  border-radius:18px;

  margin-bottom:16px;
}

/* ===== 標題 ===== */

.card h2{

  text-align:center;

  color:#5b35c8;

  font-size:26px;

  margin:10px 0;
}

/* ===== 類型 ===== */

.card h3{

  color:#7c3aed;

  font-size:20px;
}

/* ===== 內文 ===== */

.card p{

  font-size:19px;

  line-height:1.9;

  color:#222;
}

/* ===== 按鈕區 ===== */

.buttons{

  display:flex;

  flex-direction:column;

  gap:12px;

  margin-top:20px;
}

/* ===== 按鈕 ===== */

.action-btn{

  width:100%;

  padding:16px;

  border:none;

  border-radius:50px;

  font-size:20px;

  font-weight:bold;
}

/* ===== 按鈕顏色 ===== */

.read-btn{

  background:#79a9ff;

  color:white;
}

.back-btn{

  background:#8b5cf6;

  color:white;
}

.ar-btn{

  background:#222;

  color:white;
}

</style>

</head>

<body>

<!-- ===== 背景影片 ===== -->

<video
id="bg-video"
autoplay
muted
loop
playsinline>

<source
src="background.mp4"
type="video/mp4">

</video>

<!-- ===== 首頁 ===== -->

<div id="home-page">

<h1>

十二星座故事

</h1>

<!-- ===== 風象 ===== -->

<div class="element-title air">

風象星座

</div>

<div class="zodiac-grid">

<button
class="zodiac-btn"
onclick="showStory('aquarius')">

<img src="Aquarius.png">

<h3>水瓶座</h3>

<p>Aquarius</p>

</button>

<button
class="zodiac-btn"
onclick="showStory('gemini')">

<img src="Gemini.png">

<h3>雙子座</h3>

<p>Gemini</p>

</button>

<button
class="zodiac-btn"
onclick="showStory('libra')">

<img src="Libra.png">

<h3>天秤座</h3>

<p>Libra</p>

</button>

</div>

<!-- ===== 土象 ===== -->

<div class="element-title earth">

土象星座

</div>

<div class="zodiac-grid">

<button
class="zodiac-btn"
onclick="showStory('taurus')">

<img src="Taurus.png">

<h3>金牛座</h3>

<p>Taurus</p>

</button>

<button
class="zodiac-btn"
onclick="showStory('virgo')">

<img src="Virgo.png">

<h3>處女座</h3>

<p>Virgo</p>

</button>

<button
class="zodiac-btn"
onclick="showStory('capricorn')">

<img src="Capricorn.png">

<h3>摩羯座</h3>

<p>Capricorn</p>

</button>

</div>

<!-- ===== 火象 ===== -->

<div class="element-title fire">

火象星座

</div>

<div class="zodiac-grid">

<button
class="zodiac-btn"
onclick="showStory('aries')">

<img src="Aries.png">

<h3>牡羊座</h3>

<p>Aries</p>

</button>

<button
class="zodiac-btn"
onclick="showStory('leo')">

<img src="Leo.png">

<h3>獅子座</h3>

<p>Leo</p>

</button>

<button
class="zodiac-btn"
onclick="showStory('sagittarius')">

<img src="Sagittarius.png">

<h3>射手座</h3>

<p>Sagittarius</p>

</button>

</div>

<!-- ===== 水象 ===== -->

<div class="element-title water">

水象星座

</div>

<div class="zodiac-grid">

<button
class="zodiac-btn"
onclick="showStory('cancer')">

<img src="Cancer.png">

<h3>巨蟹座</h3>

<p>Cancer</p>

</button>

<button
class="zodiac-btn"
onclick="showStory('scorpio')">

<img src="Scorpio.png">

<h3>天蠍座</h3>

<p>Scorpio</p>

</button>

<button
class="zodiac-btn"
onclick="showStory('pisces')">

<img src="Pisces.png">

<h3>雙魚座</h3>

<p>Pisces</p>

</button>

</div>

</div>

<!-- ===== 故事頁 ===== -->

<div id="story-page">

<div class="card">

<img id="story-img">

<h2 id="story-title"></h2>

<h3 id="story-type"></h3>

<p id="story-text"></p>

<div class="buttons">

<button
class="action-btn read-btn"
onclick="playAudio()">

朗讀故事

</button>

<button
class="action-btn back-btn"
onclick="backToHome()">

返回12星座

</button>

<button
class="action-btn ar-btn"
onclick="backToAR()">

返回AR相機

</button>

</div>

</div>

</div>

<audio id="audio-player"></audio>

<script>

const zodiacData = {

aquarius:{
title:"水瓶座 Aquarius（1/20~2/18）",
type:"風象星座｜希臘神話起源",
img:"Aquarius.png",
audio:"Aquarius.m4a",
text:"形像是一個持著瓶子在斟酒的美少年蓋尼米德，據說他是特洛伊的王子。有一天，他替父親看羊時，宙斯在天空經過，一見蓋尼米德即對他迷戀，變身成一隻老鷹擄走蓋尼米德到奧林匹斯山，而蓋尼米德從此成為宙斯身旁的倒酒僮。"
},

gemini:{
title:"雙子座 Gemini（5/21~6/21）",
type:"風象星座｜希臘神話起源",
img:"Gemini.png",
audio:"",
text:"天神宙斯與斯巴達王后勒達所生的孿生子卡斯托耳和波魯克斯，兩人一生充滿無數的英雄壯舉。但他們因和伊達斯和林叩斯分配戰利品時產生矛盾，互相反目成仇並開始決鬥。"
},

libra:{
title:"天秤座 Libra（9/23~10/22）",
type:"風象星座｜希臘神話起源",
img:"Libra.png",
audio:"",
text:"正義女神阿斯特莉亞在為人類所做善惡裁判時所用的天平，一隻手持天平，一隻手握斬除邪惡的劍，為求公正，所以眼睛皆矇著。"
},

taurus:{
title:"金牛座 Taurus（4/21～5/20）",
type:"土象星座｜希臘神話起源",
img:"Taurus.png",
audio:"",
text:"傳說，宙斯變成一頭雪白公牛接近赫洛蓓公主，最後帶著她渡過大海，並在克里特島生活。"
},

virgo:{
title:"處女座 Virgo（8/23～9/22）",
type:"土象星座｜希臘神話起源",
img:"Virgo.png",
audio:"",
text:"狄蜜特為了尋找被黑帝斯帶走的女兒波瑟芬妮而四處流浪，後來人們為了紀念她對女兒的愛，便有了處女座。"
},

capricorn:{
title:"摩羯座 Capricorn（12/23～1/22）",
type:"土象星座｜希臘神話起源",
img:"Capricorn.png",
audio:"",
text:"牧神潘恩為了逃離群妖追擊，跳入尼羅河化成羊身魚尾的模樣，成為摩羯座。"
},

aries:{
title:"牡羊座 Aries（3/21～4/19）",
type:"火象星座｜希臘神話起源",
img:"Aries.png",
audio:"",
text:"宙斯派出擁有金色羊毛的神羊救走王子普里克索斯與公主海倫，後來神羊被升上天空，成為牡羊座。"
},

leo:{
title:"獅子座 Leo（7/23～8/22）",
type:"火象星座｜希臘神話起源",
img:"Leo.png",
audio:"",
text:"赫丘力完成十二試煉時，赤手空拳打敗尼米亞獅子，宙斯便將獅子升上天空成為獅子座。"
},

sagittarius:{
title:"射手座 Sagittarius（11/23～12/21）",
type:"火象星座｜希臘神話起源",
img:"Sagittarius.png",
audio:"",
text:"奇龍善良又充滿智慧，最後因赫丘力的毒箭誤傷而死去，宙斯為紀念他而創造射手座。"
},

cancer:{
title:"巨蟹座 Cancer（6/22～7/22）",
type:"水象星座｜希臘神話起源",
img:"Cancer.png",
audio:"",
text:"巨蟹在赫拉克勒斯與九頭蛇戰鬥時出手幫助九頭蛇，最後被踩死，赫拉將牠升上天空成為巨蟹座。"
},

scorpio:{
title:"天蠍座 Scorpio（10/24~11/22）",
type:"水象星座｜希臘神話起源",
img:"Scorpio.png",
audio:"",
text:"天后希拉派出巨蠍刺殺狂妄的獵人俄里翁，最後巨蠍被升上天空成為天蠍座。"
},

pisces:{
title:"雙魚座 Pisces（2/19～3/20）",
type:"水象星座｜希臘神話起源",
img:"Pisces.png",
audio:"",
text:"阿佛洛狄忒與邱比特為躲避巨神提豐，化成兩條魚逃跑，後來成為雙魚座。"
}

};

let currentAudio = "";

function showStory(id){

const zodiac = zodiacData[id];

currentAudio = zodiac.audio;

document.getElementById(
"home-page"
).style.display = "none";

document.getElementById(
"story-page"
).style.display = "block";

document.getElementById(
"story-img"
).src = zodiac.img;

document.getElementById(
"story-title"
).innerText = zodiac.title;

document.getElementById(
"story-type"
).innerText = zodiac.type;

document.getElementById(
"story-text"
).innerText = zodiac.text;

window.scrollTo(0,0);

}

function playAudio(){

const audio =
document.getElementById(
"audio-player"
);

audio.pause();

audio.currentTime = 0;

if(currentAudio){

audio.src = currentAudio;

audio.play();

}

}

function backToHome(){

const audio =
document.getElementById(
"audio-player"
);

audio.pause();

audio.currentTime = 0;

document.getElementById(
"story-page"
).style.display = "none";

document.getElementById(
"home-page"
).style.display = "block";

}

function backToAR(){

window.location.href =
"index.html";

}

</script>

</body>

</html>
