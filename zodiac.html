<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
黃道十二宮 AR展示學習
</title>

<style>

*{
  box-sizing:border-box;
}

html,
body{

  margin:0;
  padding:0;

  width:100%;
  min-height:100%;

  overflow-x:hidden;

  font-family:
  "Microsoft JhengHei",
  sans-serif;
}

/* ===== 背景影片 ===== */

#bg-video{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  object-fit:cover;

  z-index:-1;
}

/* ===== 頁面 ===== */

body{

  padding:25px;
}

/* ===== 標題 ===== */

.main-title{

  text-align:center;

  color:white;

  font-size:52px;

  font-weight:bold;

  line-height:1.4;

  margin:20px 0 40px;

  letter-spacing:4px;

  text-shadow:
    0 0 10px #fff,
    0 0 20px #8b5cf6,
    0 0 40px #60a5fa;
}

/* ===== 強制換行 ===== */

.main-title span{

  display:block;
}

/* ===== 星座排列 ===== */

.zodiac-grid{

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:20px;

  max-width:1200px;

  margin:auto;
}

/* ===== 圖片按鈕 ===== */

.zodiac-btn{

  border:none;

  background:none;

  padding:0;

  cursor:pointer;
}

/* ===== 圖片 ===== */

.zodiac-btn img{

  width:100%;

  display:block;

  border-radius:20px;

  transition:0.3s;
}

/* ===== 圖片動畫 ===== */

.zodiac-btn img:hover{

  transform:scale(1.05);
}

/* ===== 來源 ===== */

.source{

  text-align:center;

  color:white;

  margin-top:40px;

  font-size:16px;

  line-height:2;

  text-shadow:
  0 0 8px black;
}

.source a{

  color:#93c5fd;

  text-decoration:none;
}

.source a:hover{

  text-decoration:underline;
}

/* ===== 手機版 ===== */

@media(max-width:768px){

  body{
    padding:16px;
  }

  .main-title{

    font-size:34px;

    margin-bottom:28px;
  }

  .zodiac-grid{

    grid-template-columns:
    repeat(2,1fr);

    gap:16px;
  }

  .source{

    font-size:14px;
  }
}

</style>

</head>

<body>

<video

muted

<source
