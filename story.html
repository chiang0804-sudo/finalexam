<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

水瓶座故事

</title>

<style>

html,
body{

  margin:0;
  padding:0;

  font-family:
  "Microsoft JhengHei",
  sans-serif;

  background:#0f172a;

  color:white;
}

/* ===== 背景 ===== */

body{

  padding:20px;
}

/* ===== 卡片 ===== */

.card{

  max-width:900px;

  margin:auto;

  background:
  rgba(255,255,255,0.1);

  border-radius:25px;

  padding:25px;

  backdrop-filter:blur(10px);
}

/* ===== 圖片 ===== */

.card img{

  width:100%;

  border-radius:20px;
}

/* ===== 標題 ===== */

h1{

  text-align:center;

  font-size:36px;
}

/* ===== 內文 ===== */

.story{

  font-size:20px;

  line-height:2;

  margin-top:20px;
}

/* ===== 按鈕 ===== */

.buttons{

  margin-top:30px;

  display:flex;

  flex-direction:column;

  gap:15px;
}

button{

  border:none;

  border-radius:50px;

  padding:16px;

  font-size:20px;

  color:white;

  cursor:pointer;
}

.read-btn{

  background:#60a5fa;
}

.home-btn{

  background:#8b5cf6;
}

.ar-btn{

  background:#222;
}

</style>

</head>

<body>

<div class="card">

<img src="Aquarius.png">

<h1>

水瓶座 Aquarius
（1/20~2/18）

</h1>

<div class="story">

風象星座｜希臘神話起源<br><br>

形像是一個持著瓶子在斟酒的美少年蓋尼米德，據說他是特洛伊的王子。有一天，他替父親看羊時，宙斯在天空經過，一見蓋尼米德即對他迷戀，變身成一隻老鷹擄走蓋尼米德到奧林匹斯山，而蓋尼米德從此成為宙斯身旁的倒酒僮。

</div>

<div class="buttons">

<button
class="read-btn"
onclick="playStory()">

朗讀故事

</button>

<button
class="home-btn"
onclick="backHome()">

返回12星座

</button>

<button
class="ar-btn"
onclick="goAR()">

返回AR相機

</button>

</div>

</div>

<!-- ===== 音檔 ===== -->

<audio id="audio-player">

<source
src="Aquarius.m4a"
type="audio/mp4">

</audio>

<script>

/* ===== 播放錄音 ===== */

function playStory(){

const audio =
document.getElementById(
"audio-player"
);

audio.pause();

audio.currentTime = 0;

audio.play();

}

/* ===== 返回首頁 ===== */

function backHome(){

window.location.href =
"zodiac.html";

}

/* ===== 返回AR ===== */

function goAR(){

window.location.href =
"https://yii-stu.github.io/home519/test10.html";

}

</script>

</body>

</html>
