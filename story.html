<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>星座故事</title>

<style>

body{

  margin:0;

  padding:20px;

  background:#f4f0ff;

  font-family:
  "Microsoft JhengHei",
  sans-serif;
}

.card{

  max-width:900px;

  margin:auto;

  background:white;

  border-radius:24px;

  padding:24px;

  box-shadow:
  0 0 18px
  rgba(139,92,246,0.3);
}

img{

  width:100%;

  max-height:400px;

  object-fit:cover;

  border-radius:20px;
}

h1{

  color:#5b35c8;

  text-align:center;
}

h2{

  color:#7c3aed;
}

p{

  font-size:22px;

  line-height:2;

  color:#222;
}

/* ===== 按鈕 ===== */

button{

  width:100%;

  padding:16px;

  margin-top:12px;

  border:none;

  border-radius:50px;

  font-size:20px;

  font-weight:bold;

  color:white;
}

.read-btn{
  background:#79a9ff;
}

.back-btn{
  background:#8b5cf6;
}

.ar-btn{
  background:#222;
}

</style>

</head>

<body>

<div class="card">

<img id="zodiac-img">

<h1 id="zodiac-title"></h1>

<h2 id="zodiac-type"></h2>

<p id="zodiac-story"></p>

<button
class="read-btn"
onclick="playStory()">

朗讀故事

</button>

<button
class="back-btn"
onclick="backHome()">

返回12星座

</button>

<button
class="ar-btn"
onclick="goAR()">

返回AR相機

</button>

</div>

<script>

/* ===== 星座資料 ===== */

const zodiacData = {

aquarius:{

title:"水瓶座 Aquarius（1/20~2/18）",

type:"風象星座｜希臘神話起源",

img:"Aquarius.png",

camera:"Aquarius.html",

story:
"形像是一個持著瓶子在斟酒的美少年蓋尼米德，據說他是特洛伊的王子。有一天，他替父親看羊時，宙斯在天空經過，一見蓋尼米德即對他迷戀，變身成一隻老鷹擄走蓋尼米德到奧林匹斯山，而蓋尼米德從此成為宙斯身旁的倒酒僮。"

},

pisces:{

title:"雙魚座 Pisces（2/19～3/20）",

type:"水象星座｜希臘神話起源",

img:"Pisces.png",

camera:"Pisces.html",

story:
"愛與美之神阿佛洛狄忒與兒子邱比特在河邊遊玩時，突然遭到可怕巨神提豐的襲擊。"

},

aries:{

title:"牡羊座 Aries（3/21～4/19）",

type:"火象星座｜希臘神話起源",

img:"Aries.png",

camera:"Aries.html",

story:
"從前，希臘國王亞達馬斯與雲精妮佩蕾生下王子普里克索斯和公主海倫。"

}

};

/* ===== 取得網址參數 ===== */

const params =
new URLSearchParams(
window.location.search
);

const id =
params.get("id");

const zodiac =
zodiacData[id];

/* ===== 顯示內容 ===== */

document.getElementById(
"zodiac-img"
).src =
zodiac.img;

document.getElementById(
"zodiac-title"
).innerText =
zodiac.title;

document.getElementById(
"zodiac-type"
).innerText =
zodiac.type;

document.getElementById(
"zodiac-story"
).innerText =
zodiac.story;

/* ===== 朗讀 ===== */

function playStory(){

const speech =
new SpeechSynthesisUtterance(
zodiac.story
);

speech.lang =
"zh-TW";

speech.rate = 0.9;

window.speechSynthesis.cancel();

window.speechSynthesis.speak(
speech
);

}

/* ===== 返回首頁 ===== */

function backHome(){

window.location.href =
"zodiac.html";

}

/* ===== 返回AR ===== */

function goAR(){

window.location.href =
zodiac.camera;

}

</script>

</body>

</html>
