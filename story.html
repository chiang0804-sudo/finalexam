const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const zodiac = zodiacData[id];

if(zodiac){
  document.getElementById("zodiac-img").src = zodiac.img;
  document.getElementById("zodiac-title").innerText =
    `${zodiac.name} ${zodiac.english}（${zodiac.date}）`;
  document.getElementById("zodiac-type").innerText = zodiac.type;
  document.getElementById("zodiac-story").innerText = zodiac.story;
}

function playAudio(){
  const audio = document.getElementById("audio-player");

  if(zodiac.audio){
    audio.src = zodiac.audio;
    audio.play();
  }else{
    const speech = new SpeechSynthesisUtterance(zodiac.story);
    speech.lang = "zh-TW";
    speech.rate = 0.9;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
  }
}

function backHome(){
  window.speechSynthesis.cancel();
  window.location.href = "zodiac.html";
}

function goAR(){
  window.speechSynthesis.cancel();
  window.location.href = zodiac.camera;
