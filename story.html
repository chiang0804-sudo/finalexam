/* ===== 顯示故事 ===== */




function showStory(id){

document.getElementById(
"home-page"
).style.display = "none";




document.getElementById(
"story-page"
).style.display = "block";




document.getElementById(
"story-img"
).src =
zodiac.img;




document.getElementById(
"story-title"
).innerText =
zodiac.title;




document.getElementById(
"story-type"
).innerText =
zodiac.type;




document.getElementById(
"story-text"
).innerText =
zodiac.text;




window.scrollTo(0,0);




}




/* ===== 播放錄音 ===== */




function playAudio(){




const audio =
document.getElementById(
"audio-player"
);




audio.pause();




audio.currentTime = 0;




if(currentAudio){




audio.src =
currentAudio;




audio.play();




}




}
