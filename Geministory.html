雙子座 Gemini 
（5/21~6/21）

</h1>

<div class="story">

風象星座｜希臘神話起源<br><br>

天神宙斯與斯巴達王后勒達生下了一對雙胞胎兄弟，分別是卡斯托爾與波魯克斯。哥哥卡斯托爾是凡人，擅長馬術與劍術；弟弟波魯克斯則擁有宙斯的神族血統，因此具有不死之身。兄弟倆從小感情深厚，一同經歷了許多冒險與戰鬥。
後來，在一次戰鬥中，卡斯托爾不幸戰死。波魯克斯因失去哥哥而悲痛不已，甚至向宙斯請求，願意放棄自己永生的力量，只希望能再次與哥哥團聚。宙斯被這份深厚的兄弟情誼所感動，於是讓兩人共享生命，永遠不再分離。
最後，宙斯將兄弟倆升上天空，化為今天的雙子座，而夜空中彼此相鄰的兩顆亮星，也象徵著這對感情深厚的兄弟。



</div>
