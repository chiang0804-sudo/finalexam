水瓶座 Aquarius

</h1>

<div class="story">

風象星座｜希臘神話起源<br><br>

特洛伊王子蓋尼米德是一位容貌俊美的少年，平時負責在草原上牧羊。有一天，眾神之王宙斯從天空經過時，看見了蓋尼米德，立刻被他的美貌深深吸引。於是，宙斯化身成一隻巨大的老鷹，將蓋尼米德帶回奧林帕斯山。
來到天界後，蓋尼米德被安排成為眾神宴會中的侍者，專門替眾神斟酒。宙斯非常喜愛他，經常將他留在自己身邊，也因此引起了天后赫拉的不滿與嫉妒。
宙斯擔心蓋尼米德遭到赫拉傷害，但又捨不得讓他離開天界，最後便讓他永遠留在天空之中，手持水瓶替眾神倒水。後來，宙斯將蓋尼米德的形象升上夜空，成為今天的水瓶座。



</div>
