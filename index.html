<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Aquarius AR</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html,
body,
a-scene{

  margin:0;
  padding:0;

  width:100%;
  height:100%;

  overflow:hidden;

  touch-action:none;

  font-family:
  "Microsoft JhengHei",
  sans-serif;
}

/* ===== 底部按鈕 ===== */

#bottom-menu{

  position:fixed;

  bottom:20px;
  left:50%;

  transform:translateX(-50%);

  z-index:9999;
}

/* ===== 文本按鈕 ===== */

#text-btn{

  width:90px;
  height:90px;

  border:none;

  border-radius:50%;

  background:#79a9ff;

  color:white;

  font-size:36px;

  font-weight:bold;

  box-shadow:
  0 0 20px
  rgba(121,169,255,0.7);
}

#text-btn span{

  display:block;

  font-size:16px;

  margin-top:5px;
}

</style>

</head>

<body>

<!-- ===== 底部按鈕 ===== -->

<div id="bottom-menu">

<button id="text-btn">

💬

<span>文本</span>

</button>

</div>

<!-- ===== AR場景 ===== -->

<a-scene

mindar-image="
imageTargetSrc: Aquarius.mind;
autoStart: true;
"

color-space="sRGB"

renderer="
colorManagement: true;
physicallyCorrectLights: true
"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="
enabled:false
"

>

<!-- ===== 模型 ===== -->

<a-assets>

<a-asset-item
id="AquariusModel"
src="Aquarius.glb">

</a-asset-item>

</a-assets>

<!-- ===== 相機 ===== -->

<a-camera
look-controls="enabled:false">

</a-camera>

<!-- ===== 光源 ===== -->

<a-light
type="ambient"
intensity="1.5">

</a-light>

<a-light
type="directional"
intensity="2"
position="2 4 2">

</a-light>

<!-- ===== AR Target ===== -->

<a-entity
mindar-image-target="
targetIndex:0
">

<a-gltf-model

src="#AquariusModel"

position="0 0 0"

scale="0.1 0.1 0.1">

</a-gltf-model>

</a-entity>

</a-scene>

<script>

/* ===== 文本按鈕 ===== */

document.querySelector(
"#text-btn"
).addEventListener(

"click",

()=>{

window.location.href =
"zodiac.html";

}

);

</script>

</body>

</html>
