<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8" />

<title>Aquarius AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html,
body,
a-scene{

  margin:0;
  padding:0;

  width:100%;
  height:100%;

  overflow:hidden;
}

/* ===== 故事按鈕 ===== */

#story-btn{

  position:fixed;

  bottom:30px;
  left:50%;

  transform:translateX(-50%);

  z-index:9999;

  border:none;

  border-radius:50px;

  padding:16px 28px;

  font-size:22px;

  background:#7c4dff;

  color:white;

  box-shadow:
  0 0 20px
  rgba(124,77,255,0.8);
}

</style>

</head>

<body>

<button
id="story-btn">

閱讀故事

</button>

<a-scene

mindar-image="
imageTargetSrc:Aquarius.mind;
autoStart:true;
"

color-space="sRGB"

renderer="
colorManagement:true;
physicallyCorrectLights:true
"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="
enabled:false
"

>

<a-assets>

<a-asset-item
id="AquariusModel"
src="Aquarius.glb">

</a-asset-item>

</a-assets>

<a-camera
look-controls="enabled:false">

</a-camera>

<a-light
type="ambient"
intensity="1.5">

</a-light>

<a-light
type="directional"
intensity="2"
position="2 4 2">

</a-light>

<a-entity
mindar-image-target="
targetIndex:0
">

<a-gltf-model

src="#AquariusModel"

position="0 0 0"

scale="0.1 0.1 0.1">

</a-gltf-model>

</a-entity>

</a-scene>

<script>

/* ===== 進入故事頁 ===== */

document
.getElementById(
"story-btn"
)
.addEventListener(

"click",

()=>{

window.location.href =
"story.html";

}

);

</script>

</body>

</html>
