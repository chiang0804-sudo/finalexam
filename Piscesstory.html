雙魚座Pisces
（2/19～3/20）


</h1>

<div class="story">

水象星座｜希臘神話起源<br><br>

愛與美之神阿芙蘿黛蒂與兒子邱比特在河邊遊玩時，突然遭到可怕巨神提豐的襲擊。為了躲避危險，阿芙蘿黛蒂立刻跳入河中化身成魚逃跑，但她很快發現邱比特沒有跟上，於是又急忙回去尋找兒子。
找到邱比特後，為了避免兩人再次失散，阿芙蘿黛蒂便用繩子將彼此綁在一起，接著一起化成兩條魚潛入河中逃離危險。
後來，宙斯為了紀念這段母子互相守護的故事，便將牠們升上天空，成為今天的雙魚座。



</div>
